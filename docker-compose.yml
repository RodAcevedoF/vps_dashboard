services:
  dashboard:
    image: ghcr.io/rodacevedof/vps_dashboard:latest
    build: .
    container_name: sagepoint_dashboard
    restart: unless-stopped
    ports:
      - '127.0.0.1:3010:3010'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV: production
      PORT: 3010
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN}

      # Redis connection
      REDIS_HOST: ${REDIS_HOST:-sagepoint_redis}
      REDIS_PORT: ${REDIS_PORT:-6379}

      # PostgreSQL connection
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST:-sagepoint_postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}

      # Neo4j connection
      NEO4J_URI: ${NEO4J_URI:-bolt://sagepoint_neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      # API endpoints
      PROD_API_URL: ${PROD_API_URL:-http://sagepoint_api:3001}
      STAGING_API_URL: ${STAGING_API_URL:-http://sagepoint_api_staging:3002}
    networks:
      - shared
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3010/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shared:
    external: true
